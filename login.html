<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Smart Attendance System</title>

<style>
/* ===== BODY ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    align-items: center;
}

/* ===== GRADIENT ANIMATION ===== */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #667eea, #764ba2, #6a11cb, #2575fc);
    animation: gradientMove 12s ease infinite;
    z-index: -3;
}

@keyframes gradientMove {
    0% { transform: translate(-25%, -25%) rotate(0deg); }
    50% { transform: translate(-50%, -50%) rotate(180deg); }
    100% { transform: translate(-25%, -25%) rotate(360deg); }
}

/* ===== BLOBS ===== */
.blob {
    position: absolute;
    width: 260px;
    height: 260px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    animation: floatBlob 10s infinite ease-in-out alternate;
}

.blob1 { width: 300px; height: 300px; background: #667eea; top: 10%; left: 10%; }
.blob2 { width: 250px; height: 250px; background: #764ba2; bottom: 10%; right: 10%; }
.blob3 { width: 200px; height: 200px; background: #6a11cb; top: 50%; left: 60%; }

@keyframes floatBlob {
    from { transform: translateY(0px) scale(1); }
    to { transform: translateY(-40px) scale(1.2); }
}

/* ===== PARTICLES ===== */
.particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
    animation: moveParticles linear infinite;
}

@keyframes moveParticles {
    from { transform: translateY(0px); }
    to { transform: translateY(-100vh); }
}

/* ===== CARD ===== */
.container {
    width: 100%;
    max-width: 420px;
    z-index: 2;
}

/* ===== TRANSPARENT CARD ===== */
.form-section {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    color: white;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* ===== TABS ===== */
.login-tabs {
    display: flex;
    margin-bottom: 25px;
    border-radius: 10px;
    overflow: hidden;
}

.login-tab {
    flex: 1;
    padding: 12px;
    cursor: pointer;
    border: none;
    font-weight: 600;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: 0.3s;
}

.login-tab.active {
    background: white;
    color: #667eea;
}

.login-tab:hover {
    background: rgba(255,255,255,0.3);
}

/* ===== FORM ===== */
.login-form {
    display: none;
    animation: fadeIn 0.4s ease;
}

.login-form.active {
    display: block;
}

.form-group {
    margin-bottom: 18px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 5px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    box-shadow: 0 0 10px white;
    transform: scale(1.02);
}

/* ===== BUTTON ===== */
.btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: white;
    color: #667eea;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* ===== LINKS ===== */
.auth-link, .back-link {
    text-align: center;
    margin-top: 15px;
}

a {
    color: #fff;
}

/* ===== MESSAGE ===== */
.message { text-align: center; margin-top: 10px; }
.success { color: lightgreen; }
.error { color: #ff6b6b; }
.warning { color: #ffd166; }

.admin-badge {
    background: white;
    color: #667eea;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
}
</style>
</head>

<body>

<!-- BLOBS -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<!-- PARTICLES -->
<script>
for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.top = Math.random() * 100 + "vh";
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    document.body.appendChild(p);
}
</script>

<div class="container">
<div class="form-section">

<h1>Smart Login</h1>

<div class="login-tabs">
    <button class="login-tab active" data-tab="student">Student</button>
    <button class="login-tab" data-tab="admin">Admin <span class="admin-badge">Admin</span></button>
</div>

<!-- STUDENT LOGIN -->
<form id="studentLoginForm" class="login-form active">
    <div class="form-group">
        <input type="text" id="studentRoll" placeholder="Roll Number" required>
    </div>
    <div class="form-group">
        <input type="password" id="studentPassword" placeholder="Password" required>
    </div>

    <button class="btn">Login</button>
</form>

<!-- ADMIN LOGIN -->
<form id="adminLoginForm" class="login-form">
    <div class="form-group">
        <input type="text" id="adminId" placeholder="Admin ID" required>
    </div>
    <div class="form-group">
        <input type="password" id="adminPassword" placeholder="Password" required>
    </div>

    <button class="btn">Login as Admin</button>
</form>

<div id="message" class="message"></div>

<div class="auth-link">
    <p>New student? <a href="register.html">Register</a></p>
</div>

<div class="back-link">
    <a href="index.html">← Back</a>
</div>

</div>
</div>

<script src="app.js"></script>

<script>
// TAB FIX
document.querySelectorAll('.login-tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.login-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const tab = btn.dataset.tab;
        document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));

        if (tab === 'student') {
            document.getElementById('studentLoginForm').classList.add('active');
        } else {
            document.getElementById('adminLoginForm').classList.add('active');
        }
    });
});

/* ===== ORIGINAL BACKEND CODE ===== */

// Student Login
document.getElementById('studentLoginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const rollNumber = document.getElementById('studentRoll').value.trim();
    const password = document.getElementById('studentPassword').value;
    const messageDiv = document.getElementById('message');

    messageDiv.textContent = 'Logging in...';

    const result = await AuthManager.login(rollNumber, password);

    if (result.success) {
        messageDiv.className = 'message success';
        messageDiv.textContent = result.message;

        sessionStorage.setItem('attendance_current_user', JSON.stringify(result.student));
        sessionStorage.setItem('userType', 'student');

        setTimeout(() => {
            window.location.href = 'face-login.html';
        }, 1500);
    } else {
        messageDiv.className = 'message error';
        messageDiv.textContent = result.message;
    }
});

// Admin Login
document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const adminId = document.getElementById('adminId').value.trim();
    const adminPassword = document.getElementById('adminPassword').value;
    const messageDiv = document.getElementById('message');

    messageDiv.textContent = 'Logging in...';

    try {
        const resp = await fetch(`${getServerURL()}/teacher-login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: adminId, password: adminPassword })
        });

        const result = await resp.json();

        if (result.success) {
            messageDiv.className = 'message success';
            messageDiv.textContent = 'Welcome Admin';

            sessionStorage.setItem('attendance_current_user', JSON.stringify(result.teacher));
            sessionStorage.setItem('userType', 'admin');

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = result.message;
        }
    } catch {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Server error';
    }
});
</script>

</body>
</html>
