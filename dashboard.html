<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Attendance System</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: clamp(12px, 2vw, 16px);
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: clamp(1rem, 4vw, 2rem);
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

/* ===== HEADER ===== */
.dashboard-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.dashboard-header h1 {
    color:white;
    text-shadow:0 0 10px #00f2fe,0 0 20px #667eea;
}

.header-right {
    display:flex;
    gap:10px;
    align-items:center;
}

.user-info {
    background:rgba(255,255,255,0.1);
    padding:10px 15px;
    border-radius:20px;
    color:white;
}

.logout-btn {
    background:#ff4d4d;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
}

/* ===== BUTTONS ===== */
.view-btn {
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(102,126,234,0.6);
}

.view-btn:hover {
    box-shadow:0 0 20px rgba(102,126,234,1);
}

/* ===== STATS ===== */
.stat-card {
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:15px;
    color:white;
    margin-bottom:20px;
}

/* ===== SECTIONS ===== */
.students-section {
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    color:white;
}

.students-section h2 {
    margin-bottom:15px;
    border-left:4px solid #00f2fe;
    padding-left:10px;
}

/* ===== TABLE ===== */
.students-table {
    width:100%;
    border-spacing:0 10px;
}

.students-table td, .students-table th {
    padding:10px;
}

.students-table tbody tr {
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    transition:0.3s;
}

.students-table tbody tr:hover {
    transform:scale(1.01);
    box-shadow:0 0 20px rgba(0,242,254,0.3);
}

.student-image {
    width:45px;
    height:45px;
    border-radius:50%;
    box-shadow:0 0 10px #00f2fe;
}

.loading, .no-data {
    color:white;
}

</style>
</head>
<body>
<!-- FLOATING BG -->
<div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container dashboard-container">
        <!-- Navigation Bar -->
        <div class="dashboard-header">
            <h1>Dashboard</h1>
            <div class="header-right">
                <a href="attendance.html" style="background: #667eea; color: white; padding: 12px 24px; border: none; border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; display: inline-block;" onmouseover="this.style.background='#5568d3'; this.style.transform='translateY(-3px)'; this.style.boxShadow='0 6px 20px rgba(102, 126, 234, 0.4)';" onmouseout="this.style.background='#667eea'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.3)';">📋 Attendance</a>
                <a href="attendance-control.html" style="background: #51cf66; color: white; padding: 12px 24px; border: none; border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(81, 207, 102, 0.3); text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; display: inline-block;" onmouseover="this.style.background='#40c057'; this.style.transform='translateY(-3px)'; this.style.boxShadow='0 6px 20px rgba(81, 207, 102, 0.4)';" onmouseout="this.style.background='#51cf66'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(81, 207, 102, 0.3)';">⏱️ Start Attendance</a>
                <div class="user-info" id="userInfo">
                    Loading user info...
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Students</h3>
                <div class="number" id="totalStudents">0</div>
            </div>
        </div>

        <div class="students-section">
            <h2>Pending Approvals</h2>
            <div id="pending-students" class="loading">Loading pending students...</div>
        </div>

        <div class="students-section">
            <h2>Approved Students</h2>
            <div id="studentsContent" class="loading">Loading students...</div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <img id="modalImage" src="" alt="Student Photo">
            <h3 id="modalName"></h3>
            <p id="modalRoll"></p>
            <p id="modalDate"></p>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        console.log('Dashboard script starting...');
        
        // Wait a bit to ensure session is loaded
        setTimeout(function() {
            console.log('Checking authentication...');
            
            const currentUser = AuthManager.getCurrentUser();
            const userType = sessionStorage.getItem('userType');

            console.log('Current User from AuthManager:', currentUser);
            console.log('User Type from sessionStorage:', userType);

            if (!currentUser) {
                console.log('No current user found, redirecting to login');
                window.location.href = 'login.html';
                return;
            }

            if (userType !== 'admin') {
                console.log('User type is not admin, redirecting to login');
                window.location.href = 'login.html';
                return;
            }

            console.log('✓ User authenticated as admin');
            
            // Display user info
            document.getElementById('userInfo').innerHTML = `Welcome, <strong>${currentUser.name || 'Admin'}</strong>`;

            // Load pending and approved students
            loadPendingStudents();
            loadStudents();
        }, 100);

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', function() {
            AuthManager.logout();
            sessionStorage.removeItem('userType');
            window.location.href = 'index.html';
        });

        // Load and display pending students (awaiting approval/rejected)
        async function loadPendingStudents() {
            try {
                console.log('loadPendingStudents starting...');
                const students = await AuthManager.getPendingStudents();
                console.log('Loaded pending students count:', students.length);
                
                if (students.length === 0) {
                    document.getElementById('pending-students').innerHTML = 
                        '<div class="no-data">No pending approvals.</div>';
                    return;
                }

                let tableHTML = `
                    <table class="students-table">
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Name</th>
                                <th>Roll Number</th>
                                <th>Registered At</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                for (const student of students) {
                    const imageData = await getStudentImage(student.roll_number);
                    const date = new Date(student.registered_at).toLocaleDateString();
                    
                    let imageSrc = 'assets/no-photo.svg';
                    if (imageData && imageData.length > 0) {
                        if (imageData.startsWith('data:image')) {
                            imageSrc = imageData;
                        } else {
                            imageSrc = 'data:image/jpeg;base64,' + imageData;
                        }
                    }

                    const statusText = 'Pending';
                    const statusColor = '#ff9800';

                    tableHTML += `
                        <tr>
                            <td>
                                <img src="${imageSrc}" 
                                     class="student-image" 
                                     onclick="viewStudent('${student.roll_number}')"
                                     alt="${student.name}"
                                     onerror="this.src='assets/no-photo.svg';">
                            </td>
                            <td>${student.name}</td>
                            <td>${student.roll_number}</td>
                            <td>${date}</td>
                            <td><span style="color: ${statusColor}; font-weight: bold;">${statusText}</span></td>
                            <td>
                                <button class="view-btn" onclick="approveStudent('${student.roll_number}')" style="background: #51cf66; margin-right: 5px;">
                                    Approve
                                </button>
                                <button class="view-btn" onclick="rejectStudent('${student.roll_number}')" style="background: #ff6b6b;">
                                    Reject
                                </button>
                            </td>
                        </tr>
                    `;
                }

                tableHTML += '</tbody></table>';
                document.getElementById('pending-students').innerHTML = tableHTML;
            } catch (error) {
                console.error('Error loading pending students:', error);
                document.getElementById('pending-students').innerHTML = 
                    '<div class="no-data">Error loading pending approvals</div>';
            }
        }

        // Approve student
        async function approveStudent(roll) {
            if (confirm(`Are you sure you want to approve ${roll}?`)) {
                const result = await AuthManager.approveStudent(roll);
                if (result.success) {
                    alert('Student approved successfully!');
                    loadPendingStudents();
                    loadStudents();
                } else {
                    alert('Error: ' + result.message);
                }
            }
        }

        // Reject student
        async function rejectStudent(roll) {
            console.log('===== REJECT STUDENT CLICKED =====');
            console.log('Roll number:', roll);
            
            if (confirm(`Are you sure you want to reject ${roll}?`)) {
                console.log('User confirmed rejection');
                
                console.log('Calling AuthManager.rejectStudent...');
                const result = await AuthManager.rejectStudent(roll);
                
                console.log('Reject result:', result);
                console.log('Result success:', result.success);
                console.log('Result message:', result.message);
                
                if (result.success) {
                    console.log('✓ Rejection successful');
                    alert('Student rejected successfully!');
                    
                    console.log('Reloading pending and approved students...');
                    loadPendingStudents();
                    loadStudents();
                } else {
                    console.error('❌ Rejection failed:', result.message);
                    alert('Error: ' + result.message);
                }
            } else {
                console.log('User cancelled rejection');
            }
        }

        // Load and display approved students
        async function loadStudents() {
            try {
                console.log('Fetching approved students...');
                const response = await fetch(`${API_URL}/students`);
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Students data:', data);
                
                if (!data.success) {
                    throw new Error(data.message);
                }
                
                const students = data.data || [];
                console.log('Number of students:', students.length);
                
                document.getElementById('totalStudents').textContent = students.length;

                if (students.length === 0) {
                    document.getElementById('studentsContent').innerHTML = 
                        '<div class="no-data">No students registered yet.</div>';
                    return;
                }

                let tableHTML = `
                    <table class="students-table">
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Name</th>
                                <th>Roll Number</th>
                                <th>Registered At</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                // Fetch all images in parallel for better performance on mobile
                const imagePromises = students.map(student => 
                    getStudentImage(student.roll_number).catch(() => '')
                );
                const allImages = await Promise.all(imagePromises);

                for (let i = 0; i < students.length; i++) {
                    const student = students[i];
                    const date = new Date(student.registered_at).toLocaleDateString();
                    const imageData = allImages[i];
                    
                    console.log(`Loading image for ${student.name} (${student.roll_number}):`, imageData ? 'Found' : 'Not found');
                    
                    // Build image src properly
                    let imageSrc = 'assets/no-photo.svg';
                    if (imageData && imageData.length > 0) {
                        // Check if it already has the data URI prefix
                        if (imageData.startsWith('data:image')) {
                            imageSrc = imageData;
                        } else {
                            imageSrc = 'data:image/jpeg;base64,' + imageData;
                        }
                        console.log(`Using base64 image for ${student.roll_number}, length: ${imageData.length}`);
                        console.log(`First 50 chars: ${imageData.substring(0, 50)}`);
                    } else {
                        console.log(`No image data for ${student.roll_number}, using placeholder`);
                    }
                    
                    tableHTML += `
                        <tr>
                            <td>
                                <img src="${imageSrc}" 
                                     class="student-image" 
                                     onclick="viewStudent('${student.roll_number}')"
                                     alt="${student.name}"
                                     onerror="console.log('Image failed to load for ${student.roll_number}'); this.src='assets/no-photo.svg';">
                            </td>
                            <td>${student.name}</td>
                            <td>${student.roll_number}</td>
                            <td>${date}</td>
                            <td>
                                <button class="view-btn" onclick="viewStudent('${student.roll_number}')">
                                    View
                                </button>
                            </td>
                        </tr>
                    `;
                }

                tableHTML += '</tbody></table>';
                document.getElementById('studentsContent').innerHTML = tableHTML;
            } catch (error) {
                console.error('Error loading students:', error);
                document.getElementById('studentsContent').innerHTML = 
                    '<div class="no-data">Error loading students: ' + error.message + '</div>';
            }
        }

        // Get student image
        async function getStudentImage(roll) {
            try {
                console.log('Fetching image for roll:', roll);
                const response = await fetch(`${API_URL}/student/${roll}`);
                
                if (!response.ok) {
                    console.error('Image fetch failed with status:', response.status);
                    return '';
                }
                
                const data = await response.json();
                console.log(`Image data for ${roll}:`, data.success, data.data ? 'has data' : 'no data');
                
                if (data.success && data.data && data.data.image) {
                    // Safety check: ensure image is not empty
                    if (data.data.image.trim() === '') {
                        console.warn(`Image is empty for ${roll}`);
                        return '';
                    }
                    console.log(`✓ Image loaded for ${roll}`);
                    return data.data.image;
                } else {
                    console.warn(`No image data for ${roll}`);
                    return '';
                }
            } catch (error) {
                console.error('Error loading image for', roll, ':', error.message);
                return '';
            }
        }

        // View student details
        async function viewStudent(roll) {
            try {
                const student = await AuthManager.getStudentByRoll(roll);
                if (student) {
                    // Check if image already has data URI prefix
                    let imageSrc = 'assets/no-photo.svg';
                    if (student.image) {
                        if (student.image.startsWith('data:image')) {
                            imageSrc = student.image;
                        } else {
                            imageSrc = `data:image/jpeg;base64,${student.image}`;
                        }
                    }
                    
                    document.getElementById('modalImage').src = imageSrc;
                    
                    document.getElementById('modalName').textContent = student.name;
                    document.getElementById('modalRoll').textContent = `Roll: ${student.roll}`;
                    document.getElementById('modalDate').textContent = 
                        `Registered: ${new Date(student.registeredAt).toLocaleDateString()}`;
                    document.getElementById('imageModal').style.display = 'block';
                } else {
                    alert('Student not found');
                }
            } catch (error) {
                console.error('Error viewing student:', error);
                alert('Error loading student details');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };

        // Delete student from database
        async function deleteStudent(roll) {
            if (!confirm(`Are you sure you want to delete student ${roll}? This action cannot be undone.`)) {
                return;
            }

            try {
                const apiUrl = `${window.location.protocol}//${window.location.host}/api`;
                const response = await fetch(`${apiUrl}/student/${roll}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                // Check if response is valid JSON
                let result;
                const contentType = response.headers.get('content-type');
                
                if (contentType && contentType.includes('application/json')) {
                    result = await response.json();
                } else {
                    // If not JSON, there's a server error
                    const text = await response.text();
                    console.error('Server response:', text);
                    throw new Error('Server returned non-JSON response');
                }

                if (result.success) {
                    alert('Student deleted successfully!');
                    loadStudents(); // Reload the student list
                } else {
                    alert('Error: ' + (result.message || 'Failed to delete student'));
                }
            } catch (error) {
                console.error('Error deleting student:', error);
                alert('Error deleting student: ' + error.message);
            }
        }

    </script>
</body>
</html>
